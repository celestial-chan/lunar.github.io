<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lyra hub</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    .title {
      font-size: 3rem;
      color: #6d4aa6;
      text-shadow: 0 0 20px rgba(190,120,255,0.6);
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .menu {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 180px;
      padding: 15px;
      border-radius: 14px;
      background: rgba(250, 245, 255, 0.7);
      border: 1px solid rgba(180, 140, 255, 0.3);
      backdrop-filter: blur(12px);
      box-shadow: 0 6px 20px rgba(170,120,255,0.2);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 10px 30px rgba(170,120,255,0.35);
    }

    .card h3 {
      margin: 0;
      color: #4b2a7a;
    }

    .card p {
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="title">lyra hub</div>
  <div class="subtitle">pick where you want to go</div>

  <div class="menu">

    <div class="card" onclick="go('main.html')">
      <h3>profile</h3>
      <p>about me & stats</p>
    </div>

    <div class="card" onclick="go('projects.html')">
      <h3>projects</h3>
      <p>stuff I made</p>
    </div>

    <div class="card" onclick="go('skyblock.html')">
      <h3>skyblock</h3>
      <p>game stats + flex</p>
    </div>

  </div>

  <script>
    function go(page) {
      window.location.href = page;
    }
  </script>

</body>
</html>
