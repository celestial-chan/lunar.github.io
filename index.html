<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lyra hub</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<div class="bg-glow"></div>

<!-- ================= SPLASH ================= -->
<div id="startpg" class="page active">

  <div class="splash-container">

    <h1 class="title">lyra hub</h1>
    <p id="splashtext" class="subtitle">loading world...</p>

    <div class="menu">

      <div class="card" onclick="switchPage('homepg')">
        singleplayer
      </div>

      <div class="card" onclick="switchPage('info')">
        profile
      </div>

      <div class="card" onclick="switchPage('minecraft')">
        skyblock
      </div>

    </div>

  </div>
</div>

<!-- ================= HOME ================= -->
<div id="homepg" class="page">

  <div class="panel">

    <h1 class="title">home</h1>
    <p class="subtitle">welcome to the hub</p>

    <div class="menu">
      <div class="card" onclick="switchPage('info')">about me</div>
      <div class="card" onclick="switchPage('minecraft')">minecraft</div>
      <div class="card" onclick="switchPage('projects')">projects</div>
      <div class="card" onclick="switchPage('settingspg')">settings</div>
    </div>

  </div>

</div>

<!-- ================= INFO ================= -->
<div id="info" class="page">

  <div class="panel">

    <h1 class="title">life is like roblox</h1>

    <p>yuh</p>

    <button onclick="switchPage('homepg')">back</button>

  </div>

</div>
  
<!-- ================= SKYBLOCK / PRISON ================= -->
<div id="minecraft" class="page">

  <div class="panel">

    <h1 class="title">skyblock</h1>

    <p>prison server grind</p>

    <!-- IMAGE SLOT -->
    <div class="image-box">
      <img src="images/prison.png" alt="prison server">
    </div>


    <button onclick="switchPage('homepg')">back</button>

  </div>

</div>

<!-- ================= PROJECTS ================= -->
<div id="projects" class="page">

  <div class="panel">

    <h1 class="title">projects</h1>

    <p>things to be done</p>

    <ul>
      <li>I forgor 💀 </li>
    </ul>

    <button onclick="switchPage('homepg')">back</button>

  </div>

</div>

<!-- ================= SETTINGS ================= -->
<div id="settingspg" class="page">

  <div class="panel">

    <h1 class="title">settings</h1>

    <label>
      <input type="checkbox" id="skip">
      skip splash screen
    </label>

    <br><br>

    <button onclick="switchPage('homepg')">back</button>

  </div>

</div>

</body>
</html>
